[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/terenos-em-teresina-pi"
  to = "/terrenos-em-teresina-pi/"
  status = 301

[[redirects]]
  from = "/terenos-em-teresina"
  to = "/terrenos-em-teresina-pi/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
